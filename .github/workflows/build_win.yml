name: CI/CD

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:

jobs:
  windows-gcc:
    runs-on: windows-latest
    env:
      VFLAGS: -cc gcc
    steps:
      - name: Checkout V
        uses: actions/checkout@v3
        with:
          repository: vlang/v

      - name: Checkout gitly
        uses: actions/checkout@v3
        with:
          path: gitly

      - name: Install Markdown
        uses: actions/checkout@v3
        with:
          repository: vlang/markdown
          path: vlib/markdown

      - name: Install PCRE
        uses: actions/checkout@v3
        with:
          repository: vlang/pcre
          path: vlib/pcre

      - name: Build V
        shell: cmd
        run: |
          ls
          cd %GITHUB_WORKSPACE%
          ls
          echo " FUCKING STARTED\n=================="
          make -gcc

      - name: Install bundled SQLite
        shell: cmd
        run: |
          cd %GITHUB_WORKSPACE%
          v.exe install sqlite

      - name: Compile gitly
        shell: cmd
        run: |
          cd %GITHUB_WORKSPACE%
          v.exe -cc gcc gitly

      - name: Compile gitly (prod)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          cd %GITHUB_WORKSPACE%
          v.exe -cc gcc -prod gitly

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gitly-windows-gcc
          path: |
            gitly\gitly.exe
            gitly\static\
            gitly\templates\
          if-no-files-found: warn

      - name: Package for release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          cd %GITHUB_WORKSPACE%
          mkdir dist\gitly-windows-gcc
          copy gitly\gitly.exe dist\gitly-windows-gcc\
          xcopy /E /I gitly\static    dist\gitly-windows-gcc\static
          xcopy /E /I gitly\templates dist\gitly-windows-gcc\templates
          cd dist
          powershell Compress-Archive -Path gitly-windows-gcc -DestinationPath gitly-windows-gcc.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\gitly-windows-gcc.zip

  windows-msvc:
    runs-on: windows-latest
    env:
      VFLAGS: -cc msvc
    steps:
      - name: Checkout V
        uses: actions/checkout@v3
        with:
          repository: vlang/v

      - name: Checkout gitly
        uses: actions/checkout@v3
        with:
          path: gitly

      - name: Install Markdown
        uses: actions/checkout@v3
        with:
          repository: vlang/markdown
          path: vlib/markdown

      - name: Install PCRE
        uses: actions/checkout@v3
        with:
          repository: vlang/pcre
          path: vlib/pcre

      - name: Build V
        shell: cmd
        run: |
          ls
          cd %GITHUB_WORKSPACE%
          ls
          make.bat -msvc

      - name: Install bundled SQLite
        shell: cmd
        run: |
          cd %GITHUB_WORKSPACE%
          v.exe install sqlite

      - name: Compile gitly
        shell: cmd
        run: |
          cd %GITHUB_WORKSPACE%
          v.exe -cc msvc gitly

      - name: Compile gitly (prod)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          cd %GITHUB_WORKSPACE%
          v.exe -cc msvc -prod gitly

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gitly-windows-msvc
          path: |
            gitly\gitly.exe
            gitly\static\
            gitly\templates\
          if-no-files-found: warn

      - name: Package for release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          cd %GITHUB_WORKSPACE%
          mkdir dist\gitly-windows-msvc
          copy gitly\gitly.exe dist\gitly-windows-msvc\
          xcopy /E /I gitly\static    dist\gitly-windows-msvc\static
          xcopy /E /I gitly\templates dist\gitly-windows-msvc\templates
          cd dist
          powershell Compress-Archive -Path gitly-windows-msvc -DestinationPath gitly-windows-msvc.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\gitly-windows-msvc.zip
