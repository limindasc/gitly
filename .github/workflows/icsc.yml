name: ICSC Build Machine 

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:

jobs:
  build-rhel:
    name: Build on RHEL
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:10
      options: --user root

    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            gcc-c++ \
            cmake \
            make \
            wget \
            git \
            python3 \
            xz \

      - name: Clone ICSC
        run: |
          export ICSC_HOME=$HOME/icsc_home
          mkdir -p $ICSC_HOME
          git clone --depth 1 https://github.com/intel/systemc-compiler $ICSC_HOME/icsc

      - name: Run install.sh
        run: |
          export ICSC_HOME=$HOME/icsc_home
          cd $ICSC_HOME
          icsc/install.sh

      - name: List install output
        run: ls -la $HOME/icsc_home/

      - name: Package artifact
        run: |
          export ICSC_HOME=$HOME/icsc_home
          cd $ICSC_HOME
          tar -czf $HOME/icsc-rhel9.tar.gz \
            $(ls -d bin build designs include lib lib64 share libexec setenv.sh 2>/dev/null | tr '\n' ' ')

      - name: Copy tarball to workspace
        run: cp $HOME/icsc-rhel9.tar.gz $GITHUB_WORKSPACE/icsc-rhel9.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: icsc-rhel9
          path: icsc-rhel9.tar.gz
          if-no-files-found: warn

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: icsc-rhel9.tar.gz

  build-wsl:
    name: Build on WSL (Ubuntu)
    runs-on: windows-latest

    steps:
      - name: Enable WSL2 and install Ubuntu
        uses: Vampire/setup-wsl@v5
        with:
          distribution: Ubuntu-24.04
          additional-packages: >-
            g++
            cmake
            make
            wget
            git
            python3

      - name: Clone and build ICSC inside WSL
        shell: wsl-bash {0}
        run: |
          export ICSC_HOME=$HOME/icsc_home
          mkdir -p $ICSC_HOME
          git clone --depth 1 https://github.com/intel/systemc-compiler $ICSC_HOME/icsc
          cd $ICSC_HOME
          icsc/install.sh

      - name: Package and copy artifact
        shell: wsl-bash {0}
        run: |
          export ICSC_HOME=$HOME/icsc_home
          cd $ICSC_HOME
          tar -czf $HOME/icsc-wsl-ubuntu.tar.gz \
            $(ls -d bin build designs include lib lib64 share libexec setenv.sh 2>/dev/null | tr '\n' ' ')
          cp $HOME/icsc-wsl-ubuntu.tar.gz "$(wslpath '${{ github.workspace }}')/icsc-wsl-ubuntu.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: icsc-wsl-ubuntu
          path: icsc-wsl-ubuntu.tar.gz
          if-no-files-found: warn

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: icsc-wsl-ubuntu.tar.gz
